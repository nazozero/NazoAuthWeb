<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <meta name="theme-color" content="#080b10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,650;9..40,750&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="NazoAuth sign-in, consent, and OAuth client access interface."
    />
    <meta property="og:title" content="NazoAuth" />
    <meta
      property="og:description"
      content="Account sign-in, authorization review, client access requests, and administration."
    />
    <meta property="og:image" content="%BASE_URL%icons/android-chrome-512x512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NazoAuth</title>
    <style>
      #auth-fallback,
      #consent-fallback {
        display: none;
      }
      html.auth-fallback-active #auth-fallback,
      html.consent-fallback-active #consent-fallback {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="auth-fallback" class="auth-fallback-shell">
      <main class="auth-fallback-card" aria-labelledby="auth-fallback-title">
        <img src="%BASE_URL%icons/site-icon-64x64.png" alt="NazoAuth" />
        <p class="auth-fallback-kicker">NazoAuth</p>
        <h1 id="auth-fallback-title">Sign in</h1>
        <p class="auth-fallback-copy">Continue to your authorization request or account workspace.</p>
        <form method="post" action="/auth/login" class="auth-fallback-form">
          <input id="nazo-login-email" name="email" type="email" autocomplete="username" placeholder="Email address" required />
          <input id="nazo-login-password" name="password" type="password" autocomplete="current-password" placeholder="Password" required />
          <input id="auth-fallback-next" name="next" type="hidden" value="" />
          <button id="nazo-login-submit" type="submit">Sign in</button>
        </form>
      </main>
    </div>
    <div id="consent-fallback" class="consent-fallback-shell">
      <main class="consent-fallback-card" aria-labelledby="consent-fallback-title">
        <img src="%BASE_URL%icons/site-icon-64x64.png" alt="NazoAuth" />
        <p class="consent-fallback-kicker">NazoAuth authorization</p>
        <h1 id="consent-fallback-title">Review authorization</h1>
        <p class="consent-fallback-copy">Approve this client to continue the authorization flow.</p>
        <form method="post" action="/authorize/decision" class="consent-fallback-form">
          <input id="consent-fallback-request-id" name="request_id" type="hidden" value="" />
          <input id="consent-fallback-csrf-token" name="csrf_token" type="hidden" value="" />
          <button id="nazo-consent-deny" type="submit" name="decision" value="deny">Deny</button>
          <button id="nazo-consent-approve" type="submit" name="decision" value="approve">Approve and continue</button>
        </form>
      </main>
    </div>
    <script>
      (function () {
        function readCookie(name) {
          var prefix = encodeURIComponent(name) + '=';
          var parts = document.cookie ? document.cookie.split(';') : [];
          for (var i = 0; i < parts.length; i += 1) {
            var item = parts[i].trim();
            if (item.indexOf(prefix) === 0) {
              return decodeURIComponent(item.slice(prefix.length));
            }
          }
          return '';
        }

        var path = window.location.pathname.replace(/\/+$/, '');
        var authPath = '%BASE_URL%auth'.replace(/\/+$/, '');
        var consentPath = '%BASE_URL%consent'.replace(/\/+$/, '');
        var authFallback = document.getElementById('auth-fallback');
        var consentFallback = document.getElementById('consent-fallback');

        if (path === authPath && authFallback) {
          if (consentFallback) consentFallback.remove();
          document.documentElement.className += ' auth-fallback-active';
          var rawNext = new URLSearchParams(window.location.search).get('next');
          if (!rawNext) return;
          try {
            var resolved = new URL(rawNext, window.location.origin);
            if (resolved.origin !== window.location.origin) return;
            var next = resolved.pathname + resolved.search + resolved.hash;
            if (!next || next.charAt(0) !== '/' || next.indexOf('/auth') === 0 || next.indexOf('/ui/auth') === 0) return;
            document.getElementById('auth-fallback-next').value = next;
          } catch (error) {
            return;
          }
          return;
        }

        if (path === consentPath && consentFallback) {
          if (authFallback) authFallback.remove();
          document.documentElement.className += ' consent-fallback-active';
          document.getElementById('consent-fallback-request-id').value =
            new URLSearchParams(window.location.search).get('request_id') || '';
          document.getElementById('consent-fallback-csrf-token').value =
            readCookie('nazo_oauth_csrf');
          return;
        }

        if (authFallback) authFallback.remove();
        if (consentFallback) consentFallback.remove();
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
