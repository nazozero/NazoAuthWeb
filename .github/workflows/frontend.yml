name: Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/frontend.yml'
      - '.nvmrc'
      - 'eslint.config.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
  pull_request:
    paths:
      - '.github/workflows/frontend.yml'
      - '.nvmrc'
      - 'eslint.config.js'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm test
